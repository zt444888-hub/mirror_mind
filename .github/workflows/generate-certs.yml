name: Generate iOS Certificates
on: workflow_dispatch
jobs:
  generate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Generate + Export + Set Secrets
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          set -e
          pip3 install requests pyjwt --quiet

          python3 -c "
import json, os, subprocess, base64, uuid, time
import requests, jwt

KEY_ID = os.environ['ASC_KEY_ID']
ISSUER_ID = os.environ['ASC_ISSUER_ID']
PRIVATE_KEY = base64.b64decode(os.environ['ASC_KEY'])
BUNDLE_ID = os.environ['BUNDLE_ID']

def gjwt():
    return jwt.encode({'iss': ISSUER_ID, 'exp': int(time.time())+1200,
        'aud': 'appstoreconnect-v1', 'iat': int(time.time())},
        PRIVATE_KEY, algorithm='ES256', headers={'kid': KEY_ID})

def api(method, path, data=None):
    r = requests.request(method, 'https://api.appstoreconnect.apple.com/v1'+path,
        headers={'Authorization': 'Bearer '+gjwt(), 'Content-Type': 'application/json'}, json=data)
    if r.status_code >= 400:
        print('API Error', r.status_code, r.text[:300])
        r.raise_for_status()
    return r.json() if r.text else {}

print('=== CSR ===')
subprocess.run(['openssl','req','-new','-newkey','rsa:2048','-keyout','/tmp/key.pem','-out','/tmp/cert.csr','-nodes','-subj','/C=CN/O=MM/CN=dist'], check=True)
with open('/tmp/cert.csr') as f: csr=f.read()

print('=== Certificate ===')
c=api('POST','/certificates',{'data':{'type':'certificates','attributes':{'csrContent':csr,'certificateType':'DISTRIBUTION'}}})
with open('/tmp/dist.cer','w') as f: f.write(c['data']['attributes']['certificateContent'])
cid=c['data']['id']
print('Cert:',cid)

print('=== Bundle ID ===')
b=api('GET','/bundleIds?filter[identifier]='+BUNDLE_ID)
bid=b['data'][0]['id'] if b.get('data') else api('POST','/bundleIds',{'data':{'type':'bundleIds','attributes':{'name':'MM','identifier':BUNDLE_ID,'platform':'IOS'}}})['data']['id']
print('BID:',bid)

print('=== Profile ===')
p=api('POST','/profiles',{'data':{'type':'profiles','attributes':{'name':'MM Dist '+str(int(time.time())),'profileType':'IOS_APP_STORE'},'relationships':{'bundleId':{'data':{'type':'bundleIds','id':bid}},'certificates':{'data':[{'type':'certificates','id':cid}]}}}})
with open('/tmp/profile.mobileprovision','w') as f: f.write(p['data']['attributes']['profileContent'])
print('Profile OK')

print('=== P12 ===')
pw='ci-p12-'+uuid.uuid4().hex[:24]
with open('/tmp/key.pem') as f: k=f.read()
with open('/tmp/dist.cer') as f: c=f.read()
with open('/tmp/c.pem','w') as f: f.write(k+chr(10)+c)
subprocess.run(['openssl','pkcs12','-export','-in','/tmp/c.pem','-out','/tmp/dist.p12','-passout','pass:'+pw,'-name','iOS Distribution'], check=True)
with open('/tmp/dist.p12','rb') as f: cb=base64.b64encode(f.read()).decode()
with open('/tmp/profile.mobileprovision','rb') as f: pb=base64.b64encode(f.read()).decode()
for n,v in [('IOS_DISTRIBUTION_CERT_BASE64',cb),('IOS_PROVISION_PROFILE_BASE64',pb),('IOS_P12_PASSWORD',pw)]:
    subprocess.run(['gh','secret','set',n,'--body',v,'--repo','zt444888-hub/mirror_mind'], check=True)
    print('Set',n)
print('All 3 secrets set!')
"
