name: Generate iOS Certificates
on: workflow_dispatch
jobs:
  generate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Generate certs
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          set -e
          mkdir -p ~/private_keys ./output
          echo "$ASC_KEY" | base64 --decode > ~/private_keys/AuthKey_$ASC_KEY_ID.p8
          gem install fastlane --no-document --quiet

          fastlane cert --development false --output_path ./output \
            --team_id "$TEAM_ID" \
            --api_key_path ~/private_keys/AuthKey_$ASC_KEY_ID.p8

          fastlane sigh --app_identifier "$BUNDLE_ID" \
            --output_path ./output \
            --team_id "$TEAM_ID" \
            --api_key_path ~/private_keys/AuthKey_$ASC_KEY_ID.p8 \
            --skip_install

          P12_PW="ci-p12-$(openssl rand -hex 12)"
          security find-identity -v -p basic | grep "Apple Distribution" | \
            head -1 | awk '{print $2}' | \
            xargs -I{} security export -k login.keychain -t identities \
              -f pkcs12 -P "$P12_PW" -o ./output/dist.p12 {}

          CERT_B64=$(base64 -i ./output/dist.p12 | tr -d '\n')
          PROFILE_B64=$(base64 -i ./output/*.mobileprovision | tr -d '\n')

          echo "$GH_TOKEN" | gh auth login --with-token
          gh secret set IOS_DISTRIBUTION_CERT_BASE64 --body "$CERT_B64" \
            --repo zt444888-hub/mirror_mind
          gh secret set IOS_PROVISION_PROFILE_BASE64 --body "$PROFILE_B64" \
            --repo zt444888-hub/mirror_mind
          gh secret set IOS_P12_PASSWORD --body "$P12_PW" \
            --repo zt444888-hub/mirror_mind

          echo "All 3 secrets set successfully"
