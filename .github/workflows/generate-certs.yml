name: Generate iOS Certificates
on: workflow_dispatch
jobs:
  generate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install fastlane
        run: gem install fastlane --no-document --quiet

      - name: Generate Distribution Certificate
        env:
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          mkdir -p ./output
          fastlane cert --development false --output_path ./output \
            --team_id "$TEAM_ID" --username "$FASTLANE_USER"

      - name: Generate Provisioning Profile
        env:
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          fastlane sigh --app_identifier "$BUNDLE_ID" --output_path ./output \
            --team_id "$TEAM_ID" --username "$FASTLANE_USER" --skip_install

      - name: Export Certificate and Set Secrets
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          set -e
          P12_PW="ci-p12-$(openssl rand -hex 12)"
          CERT_HASH=$(security find-identity -v -p basic | \
            grep "Apple Distribution" | head -1 | awk '{print $2}')
          security export -k login.keychain -t identities -f pkcs12 \
            -P "$P12_PW" -o ./output/dist.p12 "$CERT_HASH"
          CERT_B64=$(base64 -i ./output/dist.p12 | tr -d '\n')
          PROFILE_B64=$(base64 -i ./output/*.mobileprovision | tr -d '\n')
          echo "$GH_TOKEN" | gh auth login --with-token
          gh secret set IOS_DISTRIBUTION_CERT_BASE64 --body "$CERT_B64" \
            --repo zt444888-hub/mirror_mind
          gh secret set IOS_PROVISION_PROFILE_BASE64 --body "$PROFILE_B64" \
            --repo zt444888-hub/mirror_mind
          gh secret set IOS_P12_PASSWORD --body "$P12_PW" \
            --repo zt444888-hub/mirror_mind
          echo "All 3 secrets set successfully"
