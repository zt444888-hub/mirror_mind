name: Generate iOS Certificates
on: workflow_dispatch
jobs:
  generate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'
      - name: Generate certs
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          set -e
          mkdir -p ~/private_keys ./output
          echo "$ASC_KEY" | base64 --decode > ~/private_keys/AuthKey_$ASC_KEY_ID.p8
          gem install fastlane --no-document --quiet

          # Generate distribution cert
          fastlane cert --development false --output_path ./output --team_id "$TEAM_ID" --api_key_path ~/private_keys/AuthKey_$ASC_KEY_ID.p8

          # Generate provisioning profile
          fastlane sigh --app_identifier "$BUNDLE_ID" --output_path ./output --team_id "$TEAM_ID" --api_key_path ~/private_keys/AuthKey_$ASC_KEY_ID.p8 --skip_install

          # Export cert as p12
          P12_PW="ci-p12-$(openssl rand -hex 12)"
          security find-identity -v -p basic | grep "Apple Distribution" | head -1 | awk '{print $2}' | xargs -I{} security export -k login.keychain -t identities -f pkcs12 -P "$P12_PW" -o ./output/dist.p12 {}

          # Set secrets
          CERT_B64=$(base64 -i ./output/dist.p12 | tr -d '\n')
          PROFILE_B64=$(base64 -i ./output/*.mobileprovision | tr -d '\n')

          for pair in "IOS_DISTRIBUTION_CERT_BASE64:$CERT_B64" "IOS_PROVISION_PROFILE_BASE64:$PROFILE_B64" "IOS_P12_PASSWORD:$P12_PW"; do
            name="${pair%%:*}"
            value="${pair#*:}"
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/zt444888-hub/mirror_mind/actions/secrets/$name" -d "{\"encrypted_value\":\"$(echo -n "$value" | base64 | tr -d '\n')\",\"key_id\":\"\"}" || true
          done
          echo "Done"
