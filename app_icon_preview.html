<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f7; font-family: -apple-system, sans-serif; }
.frame { width: 400px; height: 400px; border-radius: 80px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
svg { display: block; width: 100%; height: 100%; }
h1 { text-align: center; color: #333; font-size: 28px; margin-bottom: 30px; }
</style>
</head>
<body style="flex-direction:column">
<h1>心镜 MirrorMind — App 图标预览</h1>
<div class="frame">
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024"><stop offset="0%" stop-color="#4A90D9"/><stop offset="50%" stop-color="#6C5CE7"/><stop offset="100%" stop-color="#A29BFE"/></linearGradient>
<linearGradient id="h" x1="-100" y1="-50" x2="100" y2="100"><stop offset="0%" stop-color="#FD79A8"/><stop offset="50%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#FDCB6E"/></linearGradient>
<filter id="g"><feGaussianBlur stdDeviation="8"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
<circle cx="512" cy="480" r="260" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
<g transform="translate(512,470) scale(1.3)" filter="url(#g)">
<path d="M0,30 C-80,-60 -160,20 0,80 C160,20 80,-60 0,30Z" fill="url(#h)" opacity="0.95"/>
</g>
<g fill="rgba(255,255,255,0.5)"><circle cx="220" cy="180" r="6"/><circle cx="780" cy="240" r="5"/><circle cx="180" cy="780" r="4"/><circle cx="820" cy="720" r="6"/><circle cx="512" cy="130" r="3"/></g>
</svg>
</div>
<p style="text-align:center;margin-top:20px;color:#888;font-size:14px;">按 Cmd+Shift+4 截图 → 选择这个预览区域 → 保存到桌面</p>
</body>
</html>
