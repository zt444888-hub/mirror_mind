workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - |
        set -e
        echo "===== 0. Install Python deps ====="
        pip3 install requests pyjwt --quiet

        echo "===== 0.5 Generate Certificate ====="
        python3 -c "
        import json, os, subprocess, base64, uuid, time, requests, jwt
        KEY_ID = os.environ['APP_STORE_CONNECT_KEY_ID']
        ISSUER_ID = os.environ['APP_STORE_CONNECT_ISSUER_ID']
        PRIVATE_KEY = base64.b64decode(os.environ['APP_STORE_CONNECT_API_KEY'])
        BUNDLE_ID = 'com.mirrormind.mirrorMind'
        def gjwt():
            return jwt.encode({'iss': ISSUER_ID, 'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1', 'iat': int(time.time())}, PRIVATE_KEY, algorithm='ES256', headers={'kid': KEY_ID})
        def api(method, path, data=None):
            r = requests.request(method, 'https://api.appstoreconnect.apple.com/v1'+path, headers={'Authorization': 'Bearer '+gjwt(), 'Content-Type': 'application/json'}, json=data)
            if r.status_code >= 400: print('API Error', r.status_code, r.text[:300]); r.raise_for_status()
            return r.json() if r.text else {}
        import shutil, tempfile
        certs = api('GET', '/certificates?filter[certificateType]=DISTRIBUTION&limit=1')
        if certs.get('data'):
            cert_id = certs['data'][0]['id']
            print('Using existing cert:', cert_id)
        else:
            print('Creating new cert...')
            subprocess.run(['openssl','req','-new','-newkey','rsa:2048','-keyout','/tmp/key.pem','-out','/tmp/cert.csr','-nodes','-subj','/C=CN/O=MM/CN=dist'], check=True)
            with open('/tmp/cert.csr') as f: csr=f.read()
            c=api('POST','/certificates',{'data':{'type':'certificates','attributes':{'csrContent':csr,'certificateType':'DISTRIBUTION'}}})
            cert_id=c['data']['id']
            with open('/tmp/dist.cer','w') as f: f.write(c['data']['attributes']['certificateContent'])
            pw='p12-'+uuid.uuid4().hex[:16]
            with open('/tmp/key.pem') as f: k=f.read()
            with open('/tmp/dist.cer') as f: cert=f.read()
            with open('/tmp/c.pem','w') as f: f.write(k+chr(10)+cert)
            subprocess.run(['openssl','pkcs12','-export','-in','/tmp/c.pem','-out','/tmp/dist.p12','-passout','pass:'+pw,'-name','iOS Distribution'], check=True)
            subprocess.run(['security','import','/tmp/dist.p12','-P',pw,'-k',os.path.expanduser('~/Library/Keychains/login.keychain-db')], check=True)
            print('Cert installed')
        br=api('GET','/bundleIds?filter[identifier]='+BUNDLE_ID)
        bid=br['data'][0]['id'] if br.get('data') else api('POST','/bundleIds',{'data':{'type':'bundleIds','attributes':{'name':'MM','identifier':BUNDLE_ID,'platform':'IOS'}}})['data']['id']
        profiles=api('GET','/profiles?filter[profileType]=IOS_APP_STORE&filter[bundleId]='+bid+'&limit=1')
        if not profiles.get('data'):
            p=api('POST','/profiles',{'data':{'type':'profiles','attributes':{'name':'MM Dist '+str(int(time.time())),'profileType':'IOS_APP_STORE'},'relationships':{'bundleId':{'data':{'type':'bundleIds','id':bid}},'certificates':{'data':[{'type':'certificates','id':cert_id}]}}}})
            with open('/tmp/profile.mobileprovision','w') as f: f.write(p['data']['attributes']['profileContent'])
            profile_bytes = base64.b64decode(p['data']['attributes']['profileContent'])
            uuid_output = subprocess.run(['grep','-a','UUID','-A1','-'], input=profile_bytes, capture_output=True, text=True)
            prov_uuid = uuid_output.stdout.strip().split()[-1] if 'UUID' in uuid_output.stdout else 'unknown'
            prov_dir = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles/')
            os.makedirs(prov_dir, exist_ok=True)
            with open(os.path.join(prov_dir, prov_uuid+'.mobileprovision'), 'wb') as f: f.write(profile_bytes)
            print('Profile installed')
        else:
            print('Profile already exists')
        print('Signing setup complete')
        " 
        echo "===== 1. pub get ====="
        flutter pub get
        echo "===== 2. pod install ====="
        cd ios && pod install && cd ..
        echo "===== 3. build IPA ====="
        flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
        echo "===== 4. upload ====="
        xcrun altool --upload-app -f $(find build/ios/ipa -name "*.ipa" | head -1) -t ios --apiKey $APP_STORE_CONNECT_KEY_ID --apiIssuer $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/ios/ipa/*.ipa