workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
      groups:
        - appstore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - |
        echo '-----BEGIN PRIVATE KEY-----' > /tmp/key.p8
        echo 'MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg48hEZxZwmXflNxtZ' >> /tmp/key.p8
        echo '2yw/biuv7r10Z6h6McTrESlbLhWgCgYIKoZIzj0DAQehRANCAARb9yVYyYnmhSkn' >> /tmp/key.p8
        echo 'PhuvJ5grCtGsr2NtIJcmoMRxUgDRJUon1+WHMKCHUwliClwiIuKxrtuoAsu3kI0q' >> /tmp/key.p8
        echo 'xKjFgtC9' >> /tmp/key.p8
        echo '-----END PRIVATE KEY-----' >> /tmp/key.p8
        pip3 install pyjwt cryptography --quiet 2>/dev/null
        JWT=$(python3 -c "import jwt,time,os;print(jwt.encode({'iss':os.environ['APP_STORE_CONNECT_ISSUER_ID'],'exp':int(time.time())+1200,'aud':'appstoreconnect-v1','iat':int(time.time())},open('/tmp/key.p8').read(),algorithm='ES256',headers={'kid':os.environ['APP_STORE_CONNECT_KEY_ID']}))")
        curl -s -H "Authorization: Bearer $JWT" "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DISTRIBUTION&limit=1" > /tmp/cert_check.json
        cat /tmp/cert_check.json
        if grep -q '"data"' /tmp/cert_check.json 2>/dev/null; then
          echo "Cert exists"
        else
          openssl req -new -newkey rsa:2048 -keyout /tmp/priv.pem -out /tmp/cert.csr -nodes -subj "/C=CN/O=MM/CN=iOS Distribution" 2>/dev/null
          python3 -c "import json,sys;sys.stdout.write(json.dumps({'data':{'type':'certificates','attributes':{'csrContent':open('/tmp/cert.csr').read().strip(),'certificateType':'DISTRIBUTION'}}}))" > /tmp/payload.json
          curl -s -X POST -H "Authorization: Bearer $JWT" -H "Content-Type: application/json" -d @/tmp/payload.json "https://api.appstoreconnect.apple.com/v1/certificates" > /tmp/cert_create.json
          cat /tmp/cert_create.json
          python3 -c "import json,subprocess,os;d=json.load(open('/tmp/cert_create.json'));cid=d['data']['id'];open('/tmp/dist.cer','w').write(d['data']['attributes']['certificateContent']);pw='cip12'+__import__('uuid').uuid4().hex[:16];k=open('/tmp/priv.pem').read();c=open('/tmp/dist.cer').read();open('/tmp/comb.pem','w').write(k+chr(10)+c);subprocess.run(['openssl','pkcs12','-export','-in','/tmp/comb.pem','-out','/tmp/dist.p12','-passout','pass:'+pw,'-name','iOS Distribution'],check=True);subprocess.run(['security','import','/tmp/dist.p12','-P',pw,'-k',os.path.expanduser('~/Library/Keychains/login.keychain-db')],check=True);print('Cert:',cid)"
        fi
        echo "=== Build ==="
        flutter pub get
        cd ios && pod install && cd ..
        flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
        IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
        echo "IPA: $IPA_FILE"
        if [ -n "$IPA_FILE" ]; then
          xcrun altool --upload-app -f "$IPA_FILE" --type ios --apiKey JQ5TY68783 --apiIssuer 85ae2584-87e7-4297-8720-960978e48a55
        fi
    artifacts:
      - build/ios/ipa/*.ipa
