workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - | 
        set -e
        echo "===== pub get ====="
        flutter pub get
        echo "===== pod install ====="
        cd ios
        pod install
        cd ..
        echo "===== build IPA ====="
        flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
        echo "===== upload ====="
        xcrun altool --upload-app -f $(find build/ios/ipa -name "*.ipa" | head -1) -t ios --apiKey $APP_STORE_CONNECT_KEY_ID --apiIssuer $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/ios/ipa/*.ipa