workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
      vars:
        APP_STORE_CONNECT_KEY_ID: Encrypted(Z0FBQUFBQm5HOVkxUG4yM0hfU2pYXzlfT2txeXdoQ0M3b2dpWXN3dkw4dU1qYkR2UTNISkRRd1o5d0VaenQwRXl6dmtiY210bHZWZkN6Z3BWYTRKclhIUkdGSXlrN2lYSlE9PQ==)
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(Z0FBQUFBQm5HOVkxWUdvLWg0cm1Yb3oxSUdoVXN2ZzR1T0pxNi0wV3B0QmxGV1diVm1PcUY3bFRaUnpLMHpPRFBSVlpVU1dXTjRHS2h5LVFzSDRNYlJ6d1dYcXFaZ0hoOUE9PQ==)
        APP_STORE_CONNECT_API_KEY: Encrypted(Z0FBQUFBQm5HOVkxaDdjdndsR3FDMS1SNXZLV3ZfRHRjYkhhR2tCSUtJbFdiUGRYUUMxZTNfTm1yNS1Yb0ttaG5BcG9GQzNpdHFVdUxCaVJIdFNyNUZBVi1BR3R1c0hEbDZxazJNYi1KRE9UN1ExV2F6NUk1alBUQ0g0UGJyMEhHYzh3YXhoV2dKa2NPSl9XN1NiQ0czLXBWR19qVUtiVFhub0FJbG1FTHBtTWRyNHc9PQ==)
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - |
        set -e
        echo "===== 1. pub get ====="
        flutter pub get
        echo "===== 2. pod install ====="
        cd ios && pod install && cd ..
        echo "===== 3. build IPA ====="
        flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key: $APP_STORE_CONNECT_API_KEY
        submit_to_testflight: true