workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
      groups:
        - appstore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - |
        set -x
        printf '%s\n' "$APP_STORE_CONNECT_API_KEY" > /tmp/key.p8
        NOW=$(date +%s)
        HEADER=$(printf '{"alg":"ES256","kid":"%s","typ":"JWT"}' "$APP_STORE_CONNECT_KEY_ID" | base64 | tr '+/' '-_' | tr -d '=')
        PAYLOAD=$(printf '{"iss":"%s","exp":%s,"aud":"appstoreconnect-v1","iat":%s}' "$APP_STORE_CONNECT_ISSUER_ID" "$((NOW+1200))" "$NOW" | base64 | tr '+/' '-_' | tr -d '=')
        SIG=$(echo -n "$HEADER.$PAYLOAD" | openssl dgst -sha256 -sign /tmp/key.p8 | openssl base64 -A | tr '+/' '-_' | tr -d '=')
        JWT="$HEADER.$PAYLOAD.$SIG"
        curl -s -H "Authorization: Bearer $JWT" "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DISTRIBUTION&limit=1" > /tmp/cert_check.json
        CERT_COUNT=$(python3 -c "import json;d=json.load(open('/tmp/cert_check.json'));print(len(d.get('data',[])))" 2>&1 || echo "0")
        if [ "$CERT_COUNT" = "0" ]; then
          openssl req -new -newkey rsa:2048 -keyout /tmp/priv.pem -out /tmp/cert.csr -nodes -subj "/C=CN/O=MM/CN=iOS Distribution" 2>/dev/null
          CSR=$(python3 -c "import sys;print(sys.stdin.read().strip().replace(chr(10),chr(92)+chr(110)))" < /tmp/cert.csr)
          curl -s -X POST -H "Authorization: Bearer $JWT" -H "Content-Type: application/json" -d '{"data":{"type":"certificates","attributes":{"csrContent":"'"$CSR"'","certificateType":"DISTRIBUTION"}}}' "https://api.appstoreconnect.apple.com/v1/certificates" > /tmp/cert_create.json
          echo '' | base64 -d | python3
        fi
        flutter pub get
        cd ios && pod install && cd ..
        flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
        echo "=== IPA files ==="
        ls -la build/ios/ipa/ 2>/dev/null || echo "No ipa dir"
        IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
        echo "IPA: $IPA_FILE"
        if [ -n "$IPA_FILE" ]; then
          xcrun altool --upload-app -f "$IPA_FILE" --type ios --apiKey $APP_STORE_CONNECT_KEY_ID --apiIssuer $APP_STORE_CONNECT_ISSUER_ID
        fi
    artifacts:
      - build/ios/ipa/*.ipa

  screenshots:
    name: Generate App Store Screenshots
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: screenshots
          include: true
          source: true
    scripts:
      - |
        echo "===== Running screenshot tests ====="
        flutter pub get
        flutter test integration_test/screenshots_test.dart
        echo "===== Done ====="
    artifacts:
      - test/screenshots/*.png
