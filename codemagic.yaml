workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - |
        echo "ALIVE"
        pwd
        whoami
        ls -la /tmp/ 2>/dev/null | head -5
        echo "dead"
