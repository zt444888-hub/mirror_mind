workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - |
        set -e
        echo "===== 1. Force pub get ====="
        rm -f ios/Flutter/Generated.xcconfig ios/Flutter/ephemeral/Flutter-Generated.xcconfig
        flutter pub get
        echo "===== 2. One-time Flutter precache ====="
        flutter precache --ios
        echo "===== 3. pod install ====="
        cd ios
        pod install --repo-update
        cd ..
        echo "===== 4. build IPA ====="
        flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
        echo "===== 5. upload ====="
        xcrun altool --upload-app -f $(find build/ios/ipa -name "*.ipa" | head -1) -t ios --apiKey $APP_STORE_CONNECT_KEY_ID --apiIssuer $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/ios/ipa/*.ipa