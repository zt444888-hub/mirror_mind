workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
      groups:
        - appstore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - |
        set -ex
        echo "===== 1. Setup signing ====="
        cat > /tmp/key.p8 <<< "$APP_STORE_CONNECT_API_KEY"
        NOW=$(date +%s)
        HEADER=$(echo -n '{"alg":"ES256","kid":"'$APP_STORE_CONNECT_KEY_ID'","typ":"JWT"}' | base64 | tr '+/' '-_' | tr -d '=')
        PAYLOAD=$(echo -n '{"iss":"'$APP_STORE_CONNECT_ISSUER_ID'","exp":'$((NOW+1200))',"aud":"appstoreconnect-v1","iat":'$NOW'}' | base64 | tr '+/' '-_' | tr -d '=')
        SIG=$(echo -n "$HEADER.$PAYLOAD" | openssl dgst -sha256 -sign /tmp/key.p8 | openssl base64 -A | tr '+/' '-_' | tr -d '=')
        JWT="$HEADER.$PAYLOAD.$SIG"
        curl -s -H "Authorization: Bearer $JWT" "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DISTRIBUTION&limit=1" > /tmp/cert_check.json
        CERT_COUNT=$(python3 -c "import json;d=json.load(open('/tmp/cert_check.json'));print(len(d.get('data',[])))")
        if [ "$CERT_COUNT" = "0" ]; then
          echo "Creating new certificate..."
          set +e
        openssl req -new -newkey rsa:2048 -keyout /tmp/priv.pem -out /tmp/cert.csr -nodes -subj "/C=CN/O=MM/CN=iOS Distribution" 2>/dev/null 2>/dev/null || true
        set -e
          CSR=$(python3 -c "import sys;print(sys.stdin.read().strip().replace(chr(10),chr(92)+chr(110)))" < /tmp/cert.csr)
          curl -s -X POST -H "Authorization: Bearer $JWT" -H "Content-Type: application/json" -d '{"data":{"type":"certificates","attributes":{set +e
        "csrContent":"'$CSR'","certificateType":"DISTRIBUTION"}}}' "https://api.appstoreconnect.apple.com/v1/certificates" > /tmp/cert_create.json || echo 'curl failed, continuing'
        set -e
          echo  | base64 -d | python3
        else
          echo "Certificate already exists, skipping"
        fi
        echo "===== 2. pub get ====="
        flutter pub get
        echo "===== 3. pod install ====="
        cd ios && pod install && cd ..
        echo "===== 4. build IPA ====="
        flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
        echo "===== 5. upload ====="
        xcrun altool --upload-app -f $(find build/ios/ipa -name "*.ipa" | head -1) -t ios --apiKey $APP_STORE_CONNECT_KEY_ID --apiIssuer $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/ios/ipa/*.ipa
