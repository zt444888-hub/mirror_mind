workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
      groups:
        - appstore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - |
        set -e
        echo "===== 0. Install Python deps ====="
        pip3 install --upgrade cryptography pyjwt requests --quiet

        echo "===== 0.5 Generate Certificate ====="
        echo "" > /tmp/key.p8
        NOW=$(date +%s)
        HEADER=$(echo -n '{"alg":"ES256","kid":"'$APP_STORE_CONNECT_KEY_ID'","typ":"JWT"}' | base64 | tr '+/' '-_' | tr -d '=')
        PAYLOAD=$(echo -n '{"iss":"'$APP_STORE_CONNECT_ISSUER_ID'","exp":'$((NOW+1200))',"aud":"appstoreconnect-v1","iat":'$NOW'}' | base64 | tr '+/' '-_' | tr -d '=')
        SIG=$(echo -n "$HEADER.$PAYLOAD" | openssl dgst -sha256 -sign /tmp/key.p8 | openssl base64 -A | tr '+/' '-_' | tr -d '=')
        TOKEN="$HEADER.$PAYLOAD.$SIG"
        echo "JWT OK: ${TOKEN:0:20}..."

        curl -s -H "Authorization: Bearer $TOKEN" "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DISTRIBUTION&limit=1" > /tmp/cert_resp.json
        CERT_COUNT=$(python3 -c "import json;d=json.load(open('/tmp/cert_resp.json'));print(len(d.get('data',[])))" 2>/dev/null || echo "0")
        if [ "$CERT_COUNT" -gt 0 ]; then
            echo "Using existing cert"
        else
            echo "Creating new cert..."
            openssl req -new -newkey rsa:2048 -keyout /tmp/privkey.pem -out /tmp/cert.csr -nodes -subj "/C=CN/O=MM/CN=dist" 2>/dev/null
            CSR_ESC=$(python3 -c "import sys;print(sys.stdin.read().strip().replace(chr(10),chr(92)+chr(110)))" < /tmp/cert.csr)
            curl -s -X POST -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
                -d '{"data":{"type":"certificates","attributes":{"csrContent":"'"$CSR_ESC"'","certificateType":"DISTRIBUTION"}}}' \
                "https://api.appstoreconnect.apple.com/v1/certificates" > /tmp/cert_create.json
            python3 -c "
import json
with open('/tmp/cert_create.json') as f: d=json.load(f)
cert_id=d['data']['id']
with open('/tmp/dist.cer','w') as f: f.write(d['data']['attributes']['certificateContent'])
P12_PW='ci-'+__import__('uuid').uuid4().hex[:16]
with open('/tmp/privkey.pem') as f: k=f.read()
with open('/tmp/dist.cer') as f: c=f.read()
with open('/tmp/comb.pem','w') as f: f.write(k+chr(10)+c)
__import__('subprocess').run(['openssl','pkcs12','-export','-in','/tmp/comb.pem','-out','/tmp/dist.p12','-passout','pass:'+P12_PW,'-name','iOS Distribution'],check=True)
__import__('subprocess').run(['security','import','/tmp/dist.p12','-P',P12_PW,'-k',__import__('os').path.expanduser('~/Library/Keychains/login.keychain-db')],check=True)
print('Cert installed:',cert_id)
"
        fi
        echo "===== Signing setup complete ====="echo "===== 1. pub get ====="
        flutter pub get
        echo "===== 2. pod install ====="
        cd ios && pod install && cd ..
        echo "===== 3. build IPA ====="
        flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
        echo "===== 4. upload ====="
        xcrun altool --upload-app -f $(find build/ios/ipa -name "*.ipa" | head -1) -t ios --apiKey $APP_STORE_CONNECT_KEY_ID --apiIssuer $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/ios/ipa/*.ipa