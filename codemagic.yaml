workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          flutter packages pub get
          cd ios && pod install
      - name: Build iOS release
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(appstore-connect get-latest-testflight-build-number --pre-version "1.0.0" || 0) + 1))
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: APP_STORE_CONNECT_CREDENTIALS
        submit_to_testflight: true
        submit_to_app_store: false
