workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.x
      xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: flutter packages pub get
      - name: Install Pods
        script: cd ios && pod install && cd ..
      - name: Build IPA
        script: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
      - name: Upload to App Store Connect
        script: |
          xcrun altool --upload-app \
            -f \ \
            -t ios \
            --apiKey \ \
            --apiIssuer \
    artifacts:
      - build/ios/ipa/*.ipa