workflows:
  ios-build:
    name: iOS Build & Deploy
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - |
        echo '-----BEGIN PRIVATE KEY-----' > /tmp/key.p8
        echo 'MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgZ+pQOY5mgxKrYiKD' >> /tmp/key.p8
        echo 'HWt1AwmyKGnmXXmtdrMeF2Ve/u6hRANCAASAsnntVQQyRTrRcpghZVVAmaSrDOiT' >> /tmp/key.p8
        echo 'cfH8qMC2cRDCZpMrPAgIpCwDRHqHPJBEw6pTM0Q9iFPDqXnsAIMoVELB' >> /tmp/key.p8
        echo '-----END PRIVATE KEY-----' >> /tmp/key.p8
        echo "starting JWT"
        HEADER=${'$'}(printf '{"alg":"ES256","kid":"I3C4V5K7JFUQ","typ":"JWT"}' | base64 | tr '+/' '-_' | tr -d '=')
        echo "header done"
        NOW=${'$'}(date +%s)
        PAYLOAD=${'$'}(printf '{"iss":"sjva-eohu-bxft-otpe","exp":%s,"aud":"appstoreconnect-v1","iat":%s}' "${'$'}((NOW+1200))" "${'$'}NOW" | base64 | tr '+/' '-_' | tr -d '=')
        echo "payload done"
        SIG=${'$'}(printf '%s.%s' "${'$'}HEADER" "${'$'}PAYLOAD" | openssl dgst -sha256 -sign /tmp/key.p8 | python3 -c "import sys,base64;d=sys.stdin.buffer.read();rl=d[3];r=d[4:4+rl];sl=d[5+rl];s=d[6+rl:6+rl+sl];print(base64.urlsafe_b64encode(r+s).decode().rstrip('='))")
        echo "sig done"
        JWT="${'$'}HEADER.${'$'}PAYLOAD.${'$'}SIG"
        curl -s -H "Authorization: Bearer ${'$'}JWT" "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=DISTRIBUTION&limit=1" > /tmp/cert_check.json
        echo "curl done"
        cat /tmp/cert_check.json
        CERT_COUNT=${'$'}(python3 -c "import json;d=json.load(open('/tmp/cert_check.json'));print(len(d.get('data',[])))" 2>/dev/null || echo "0")
        echo "certs: ${'$'}CERT_COUNT"
        if [ "${'$'}CERT_COUNT" = "0" ]; then
          echo "creating cert..."
          openssl req -new -newkey rsa:2048 -keyout /tmp/priv.pem -out /tmp/cert.csr -nodes -subj "/C=CN/O=MM/CN=iOS Distribution" 2>/dev/null
          CSR=${'$'}(python3 -c "import sys;print(sys.stdin.read().strip().replace(chr(10),chr(92)+chr(110)))" < /tmp/cert.csr)
          echo '{${'$'}CSR}' | python3 -c "
import json, sys
csr = sys.stdin.read().strip()
payload = json.dumps({'data':{'type':'certificates','attributes':{'csrContent':csr,'certificateType':'DISTRIBUTION'}}})
print(payload)
" > /tmp/payload.json
          curl -s -X POST -H "Authorization: Bearer ${'$'}JWT" -H "Content-Type: application/json" -d @/tmp/payload.json "https://api.appstoreconnect.apple.com/v1/certificates" > /tmp/cert_create.json
          cat /tmp/cert_create.json
          python3 -c "
import json,subprocess,os
with open('/tmp/cert_create.json') as f:d=json.load(f)
cid=d['data']['id']
open('/tmp/dist.cer','w').write(d['data']['attributes']['certificateContent'])
pw='cip12'+__import__('uuid').uuid4().hex[:16]
k=open('/tmp/priv.pem').read();c=open('/tmp/dist.cer').read()
open('/tmp/comb.pem','w').write(k+chr(10)+c)
subprocess.run(['openssl','pkcs12','-export','-in','/tmp/comb.pem','-out','/tmp/dist.p12','-passout','pass:'+pw,'-name','iOS Distribution'],check=True)
subprocess.run(['security','import','/tmp/dist.p12','-P',pw,'-k',os.path.expanduser('~/Library/Keychains/login.keychain-db')],check=True)
print('Cert:',cid)
"
        fi
        flutter pub get
        cd ios && pod install && cd ..
        flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
        IPA_FILE=${'$'}(find build/ios/ipa -name "*.ipa" | head -1)
        echo "IPA: ${'$'}IPA_FILE"
        if [ -n "${'$'}IPA_FILE" ]; then
          xcrun altool --upload-app -f "${'$'}IPA_FILE" --type ios --apiKey I3C4V5K7JFUQ --apiIssuer sjva-eohu-bxft-otpe
        fi
    artifacts:
      - build/ios/ipa/*.ipa
